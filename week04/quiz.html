<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>Quiz 1</h1>

    <div class="container">
        <form>
            <div class="row">
                <div class="col-lg-3">
                    <div class="mb-3">
                        <label for="exampleSelect" class="form-label">1. เลือกหลักสูตร</label>
                        <select class="form-select" aria-label="Default select example" id="exampleSelect">
                            <option selected>คณะ/สาขาวิชาที่เลือกเข้าศึกษา : *</option>
                            <option value="1">คณะครุศาสตร์</option>
                            <option value="2">คณะมนุษยศาสตร์และสังคมศาสตร์</option>
                            <option value="3">คณะวิทยาศาสตร์และเทคโนโลยี </option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-2">
                        <div class="mb-1">
                            2. ข้อมูลส่วนตัว
                            <label for="exampleFormControlInput1" class="form-label">สัญชาติ : *</label>
                            <select class="form-select" aria-label="Default select example" id="exampleSelect">
                                <option selected>สัญชาติ : *</option>
                                <option value="1">ไทย</option>
                                <option value="2">ต่างชาติ</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-lg-2">
                        <div class="mb-1">
                            2. ข้อมูลส่วนตัว
                            <label for="exampleFormControlInput1" class="form-label">เพศ : *</label>
                            <select class="form-select" aria-label="Default select example" id="exampleSelect">
                                <option selected>เพศ : *</option>
                                <option value="1">ชาย</option>
                                <option value="2">หญิง</option>
                            </select>
                        </div>
                    </div>
                </div>


                <div class="row">
                    <div class="col-lg-2">
                        <div class="mb-1">
                            <label for="exampleFormControlInput1" class="form-label"> คำนำหน้าชื่อ : *</label>
                            <select class="form-select" aria-label="Default select example" id="exampleSelect">
                                <option selected>คำนำหน้าชื่อ</option>
                                <option value="1">นาย</option>
                                <option value="2">นาง</option>
                                <option value="3">นางสาว</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-lg-2">
                        <div class="mb-1">
                            <label for="exampleFormControlInput1" class="form-label"> ชื่อ</label>
                            <input class="form-control" id="exampleFormControlInput1" placeholder="ชื่อ" required />
                        </div>
                    </div>
                    <div class="col-lg-2">
                        <div class="mb-1">
                            <label for="exampleFormControlInput1" class="form-label"> นามสกุล</label>
                            <input class="form-control" id="exampleFormControlInput1" placeholder="นามสกุล" required />
                        </div>
                    </div>

                    <div class="col-lg-2">
                        <div class="mb-1">
                            <label for="exampleFormControlInput1" class="form-label">บัตรประชาชน : * </label>
                            <input class="form-control" id="exampleFormControlInput1" placeholder="บัตรประชาชน"
                                required />
                        </div>
                    </div>
                    <div class="col-lg-2">
                        <div class="mb-1">
                            <label for="exampleFormControlInput1" class="form-label"> เบอร์โทรศัพท์</label>
                            <input class="form-control" id="exampleFormControlInput1" placeholder="เบอร์โทรศัพท์" />
                        </div>
                    </div>

                    <div class="row">

                        <div class="col-lg-2">
                            <div class="mb-1">
                                <label for="exampleFormControlInput1" class="form-label"> Id Line ถ้ามี</label>
                                <input class="form-control" id="exampleFormControlInput1" placeholder="Id Line ถ้ามี" />
                            </div>
                        </div>
                        <div class="col-lg-2">
                            <div class="mb-1">
                                <label for="exampleFormControlInput1" class="form-label"> facebook ถ้ามี</label>
                                <input class="form-control" id="exampleFormControlInput1"
                                    placeholder="facebook ถ้ามี" />
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="mb-2">
                                <label for="exampleFormControlInput1" class="form-label"> EMAIL</label>
                                <input class="form-control" id="exampleFormControlInput1" placeholder="EMAIL" />
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-lg-4">
                                <div class="mb-2">
                                    <label for="exampleFormControlInput1" class="form-label"> วุฒิการศึกษา</label>
                                    <select class="form-select" aria-label="Default select example" id="exampleSelect">
                                        <option selected>วุฒิการศึกษา</option>
                                        <option value="1">ม.6</option>
                                        <option value="2">ปวช</option>
                                        <option value="3">ปวส</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="mb-2">
                                    <label for="exampleFormControlInput1" class="form-label"> ชื่อสถานศึกษาเดิม</label>
                                    <input class="form-control" id="exampleFormControlInput1"
                                        placeholder=" ชื่อสถานศึกษาเดิม" />
                                </div>
                            </div>
                            <div class="col-lg-4">
                                <div class="mb-2">
                                    <label for="exampleFormControlInput1" class="form-label"> จังหวัด</label>
                                    <select class="form-select" aria-label="Default select example" id="exampleSelect">
                                        <option selected>จังหวัด</option>
                                        <option value="1">ปทุม</option>
                                        <option value="2">อ่างทอง</option>
                                        <option value="3">อยุธยา</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-lg-6">
                                    <div class="mb-3">
                                        <label for="exampleFormControlInput1" class="form-label">
                                            สาขาวิชาที่เรียนจบ</label>
                                        <input class="form-control" id="exampleFormControlInput1"
                                            placeholder="สาขาวิชาที่เรียนจบ" required />
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="mb-3">
                                        <label for="exampleFormControlInput1" class="form-label"> ผลการเรีรยนเฉลี่ย
                                            (GPAX)</label>
                                        <input class="form-control" id="exampleFormControlInput1"
                                            placeholder="ผลการเรีรยนเฉลี่ย (GPAX)" required />
                                    </div>
                                </div>
                                <div class="col-lg-12">
                                    <div class="mb-6">
                                        <label for="exampleFormControlInput1" class="form-label">
                                            มีความต้องการกู้ยืมเพื่อการศึกษา</label>
                                        <select class="form-select" aria-label="Default select example"
                                            id="exampleSelect">
                                            <option selected>มีความต้องการกู้ยืมเพื่อการศึกษา</option>
                                            <option value="1">กู้</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-lg-6">
                                    <div class="mb-3">
                                        <label for="exampleFormControlInput1" class="form-label">เอกสารแนบ</label>
                                        <input type="file" class="form-control" name="image_stu" id="image_stu">
                                    </div>
                                    <button type="submit" class="btn btn-success">ยืนยัน</button>
                                    <button type="button" class="btn btn-danger">ยกเลิก</button>
                                </div>
        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
